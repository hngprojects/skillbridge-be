name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Check formatting
      #   run: pnpm check-format

      - name: Lint code
        timeout-minutes: 5
        run: pnpm run check-lint:ci
      
      - name: Lint code
        id: lint
        timeout-minutes: 5
        continue-on-error: true
        run: pnpm run check-lint:ci
      
      - name: Lint debug
        if: always() && steps.lint.outcome != 'success'
        timeout-minutes: 5
        run: pnpm exec eslint 'src/**/*.ts' 'test/**/*.ts' --debug
      
      - name: Fail if lint failed
        if: always() && steps.lint.outcome != 'success'
        run: exit 1

      - name: Run tests
        run: pnpm test -- --passWithNoTests

      - name: Build application
        run: pnpm build
