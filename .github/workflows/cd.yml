name: CD

on:
  push:
    branches: [staging, prod]

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: ci
    environment: ${{ github.ref_name == 'prod' && 'production' || 'staging' }}
    steps:
      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            echo "dir=staging" >> "$GITHUB_OUTPUT"
            echo "app=skillbridge-staging" >> "$GITHUB_OUTPUT"
          else
            echo "dir=production" >> "$GITHUB_OUTPUT"
            echo "app=skillbridge-prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOTENV: ${{ github.ref_name == 'prod' && secrets.PRODUCTION_ENV || secrets.STAGING_ENV }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOTENV
          script_stop: true
          script: |
            set -e

            DEPLOY_DIR="$HOME/skillbridge/backend/${{ steps.target.outputs.dir }}"
            APP_NAME="${{ steps.target.outputs.app }}"
            REPO="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            cd "$DEPLOY_DIR"

            # Clone on first deploy, pull on subsequent
            if [ ! -d ".git" ]; then
              git clone --branch "$BRANCH" "$REPO" .
            else
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi

            # Write environment file
            printf '%s\n' "$DOTENV" > .env

            # Install dependencies and build
            corepack enable
            pnpm install --frozen-lockfile
            pnpm build

            # Run database migrations
            pnpm migration:run

            # Restart application with PM2
            export PM2_APP_NAME="$APP_NAME"
            ENV_FLAG="${{ github.ref_name == 'prod' && 'production' || 'staging' }}"

            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              pm2 restart ecosystem.config.cjs --env "$ENV_FLAG"
            else
              pm2 start ecosystem.config.cjs --env "$ENV_FLAG"
            fi
            pm2 save
