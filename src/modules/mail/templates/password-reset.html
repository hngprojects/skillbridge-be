<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your password</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 24px;
      background-color: #f4f4f5;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
        sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #27272a;
    "
  >
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      width="100%"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="600"
            style="
              max-width: 600px;
              background: #ffffff;
              border-radius: 12px;
              border: 1px solid #e4e4e7;
              padding: 32px 40px;
            "
          >
            <tr>
              <td>
                <h1
                  style="
                    margin: 0 0 16px 0;
                    font-size: 22px;
                    font-weight: 700;
                    color: #18181b;
                  "
                >
                  Reset your SkillBridge password
                </h1>
                <p style="margin: 0 0 12px 0">
                  Use the token below to reset your password. It expires in
                  <strong>{{expiresMinutes}} minute(s)</strong>.
                </p>
                <p style="margin: 0 0 12px 0; word-break: break-all">
                  <strong
                    style="
                      display: block;
                      padding: 16px;
                      background: #f4f4f5;
                      border-radius: 8px;
                      font-family: ui-monospace, monospace;
                      font-size: 14px;
                      color: #18181b;
                    "
                    >{{token}}</strong
                  >
                </p>
                {{resetLinkBlock}}
                <p style="margin: 16px 0 0 0; color: #71717a; font-size: 13px">
                  If you did not request a reset, ignore this email.
                </p>
                <p style="margin: 24px 0 0 0">
                  Thanks,<br />
                  SkillBridge Team
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
